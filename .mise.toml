[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/scripts"
TALOS_DIR = "{{config_root}}/talos"

[tools]
python = "3.14.6"
"pipx:makejinja" = "2.8.2"
"pipx:yamlfix" = "1.19.1"
"pipx:pre-commit" = "4.6.0"
"pipx:flux-local" = "8.4.0"
"aqua:budimanjojo/talhelper" = "3.1.12"
"aqua:cilium/cilium-cli" = "0.19.5"
"aqua:cli/cli" = "2.95.0"
"aqua:cloudflare/cloudflared" = "2026.6.1"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.8"
"aqua:getsops/sops" = "3.13.1"
"aqua:go-task/task" = "3.51.1"
"aqua:helm/helm" = "4.2.2"
"aqua:helmfile/helmfile" = "1.5.5"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.1"
"aqua:kubernetes/kubectl" = "1.36.2"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.5"
"aqua:yannh/kubeconform" = "0.8.0"
pipx = "latest"
