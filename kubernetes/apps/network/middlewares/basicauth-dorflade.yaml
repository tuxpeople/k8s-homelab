---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/traefik.io/middleware_v1alpha1.json
# Ersetzt nginx.ingress.kubernetes.io/auth-type: basic für dorflade-mhd.
# ACHTUNG: Das referenzierte Secret muss den Key "users" (htpasswd-Format) enthalten.
# Das bestehende nginx-Secret "dorflade-mhd-auth" nutzt Key "auth" – ggf. neu erstellen:
#   kubectl create secret generic dorflade-mhd-traefik-auth \
#     --from-literal=users="$(kubectl get secret dorflade-mhd-auth -o jsonpath='{.data.auth}' | base64 -d)" \
#     -n productivity
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth-dorflade
  namespace: network
spec:
  basicAuth:
    secret: dorflade-mhd-traefik-auth
    realm: "Authentication Required"
