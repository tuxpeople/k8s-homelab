---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/traefik.io/middleware_v1alpha1.json
# Ersetzt nginx-GlobalConfig: hide-headers, hsts-max-age, ssl-protocols
# Referenz in Ingress-Annotation: traefik.ingress.kubernetes.io/router.middlewares: network-security-headers@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: network
spec:
  headers:
    customResponseHeaders:
      X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex"
      Server: ""
      X-Powered-By: ""
    hostsProxyHeaders:
      - "X-Forwarded-Host"
    referrerPolicy: "same-origin"
    contentTypeNosniff: true
    browserXssFilter: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31449600
    frameDeny: true
