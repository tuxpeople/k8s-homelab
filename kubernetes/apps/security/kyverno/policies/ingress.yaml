---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: &name ingress
  annotations:
    policies.kyverno.io/title: Add Ingress annotations
    policies.kyverno.io/category: Ingress
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/description: >-
      This policy will automatically add external-dns annotations to Ingresses
      if not already set (will not overwrite existing values):
      - ingressClassName: external → external-dns target for Cloudflare
      - ingressClassName: internal → external-dns target for UniFi (192.168.13.64)
      Skipped for namespaces labeled kyverno.io/exclude: "true".
    pod-policies.kyverno.io/autogen-controllers: none
spec:
  rules:
    - name: external
      match:
        any:
          - resources:
              kinds:
                - Ingress
      exclude:
        any:
          - resources:
              kinds:
                - Ingress
              namespaceSelector:
                matchLabels:
                  kyverno.io/exclude: "true"
      preconditions:
        all:
          - key: "{{ request.object.spec.ingressClassName }}"
            operator: Equals
            value: external
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              +(external-dns.alpha.kubernetes.io/target): "external.${SECRET_DOMAIN}"
    - name: internal
      match:
        any:
          - resources:
              kinds:
                - Ingress
      exclude:
        any:
          - resources:
              kinds:
                - Ingress
              namespaceSelector:
                matchLabels:
                  kyverno.io/exclude: "true"
      preconditions:
        all:
          - key: "{{ request.object.spec.ingressClassName }}"
            operator: Equals
            value: internal
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              +(external-dns.alpha.kubernetes.io/target): "192.168.13.64"
