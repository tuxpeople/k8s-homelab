---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: label-existing-namespaces
  annotations:
    policies.kyverno.io/title: Label Existing Namespaces
    policies.kyverno.io/category: Other
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Namespace
    kyverno.io/kyverno-version: 1.7.0
    policies.kyverno.io/minversion: 1.7.0
    kyverno.io/kubernetes-version: "1.23"
    policies.kyverno.io/description: >-
      Automatically labels all Namespaces with goldilocks.fairwinds.com/enabled: "true"
      to enable Goldilocks VPA recommendations for all namespaces. Triggers on any
      Namespace admission review and applies retroactively on policy updates.
      Skipped for namespaces labeled kyverno.io/exclude: "true".
spec:
  mutateExistingOnPolicyUpdate: true
  rules:
    - name: label-existing-namespaces
      match:
        any:
          - resources:
              kinds:
                - Namespace
      mutate:
        targets:
          - apiVersion: v1
            kind: Namespace
        patchStrategicMerge:
          metadata:
            labels:
              goldilocks.fairwinds.com/enabled: "true"
