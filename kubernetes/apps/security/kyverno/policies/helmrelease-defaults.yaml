---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: helmrelease-defaults
  annotations:
    policies.kyverno.io/title: HelmRelease Defaults
    policies.kyverno.io/category: Flux Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: HelmRelease
    policies.kyverno.io/description: >-
      Ensures all HelmReleases have an upgrade remediation strategy set.
      If missing, defaults to upgrade.remediation.strategy: uninstall
      to prevent permanently stalled releases after transient webhook
      failures (e.g. Kyverno restarts).
spec:
  rules:
    - name: set-upgrade-remediation-strategy
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/*/HelmRelease
      exclude:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/*/HelmRelease
              namespaceSelector:
                matchLabels:
                  kyverno.io/exclude: "true"
      preconditions:
        all:
          - key: "{{ request.object.spec.upgrade.remediation.strategy || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            upgrade:
              remediation:
                strategy: uninstall
