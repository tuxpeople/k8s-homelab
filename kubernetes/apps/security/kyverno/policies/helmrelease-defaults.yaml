---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: helmrelease-defaults
  annotations:
    policies.kyverno.io/title: HelmRelease Defaults
    policies.kyverno.io/category: Flux Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: HelmRelease
    policies.kyverno.io/description: >-
      Ensures all HelmReleases have retryInterval and upgrade remediation
      strategy set. If missing, defaults to retryInterval: 5m and
      upgrade.remediation.strategy: uninstall to prevent permanent stalled
      releases after transient webhook failures (e.g. Kyverno restarts).
spec:
  rules:
    - name: set-retry-interval
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/*/HelmRelease
      preconditions:
        all:
          - key: "{{ request.object.spec.retryInterval || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            retryInterval: 5m
    - name: set-upgrade-remediation-strategy
      match:
        any:
          - resources:
              kinds:
                - helm.toolkit.fluxcd.io/*/HelmRelease
      preconditions:
        all:
          - key: "{{ request.object.spec.upgrade.remediation.strategy || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            upgrade:
              remediation:
                strategy: uninstall
