---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-ghcr-pullsecret
  annotations:
    policies.kyverno.io/title: Add GHCR Pull Secret
    policies.kyverno.io/category: Other
    policies.kyverno.io/description: >-
      Automatically injects imagePullSecrets for ghcr.io images.
      Requires the ghcr-pullsecret Secret to exist in the namespace
      (created by the ghcr-pullsecret ClusterExternalSecret).
spec:
  rules:
    - name: add-ghcr-pullsecret
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[].image[] | [? starts_with(@, 'ghcr.io')] | length(@) }}"
            operator: GreaterThanOrEquals
            value: "1"
      mutate:
        patchStrategicMerge:
          spec:
            +(imagePullSecrets):
              - name: ghcr-pullsecret
