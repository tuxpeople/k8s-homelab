---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless
spec:
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 10m
  timeout: 30m
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: paperless-app
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: paperless-app
              spec:
                progressDeadlineSeconds: 1800
  test:
    enable: false
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: 5
      remediateLastFailure: true
    cleanupOnFail: true
  rollback:
    timeout: 10m
    cleanupOnFail: false
  valuesFrom:
    - kind: ConfigMap
      name: paperless-values
      valuesKey: values.yaml
