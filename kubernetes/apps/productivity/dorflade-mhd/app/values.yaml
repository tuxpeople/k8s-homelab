# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-3.7.3/charts/other/app-template/values.schema.json

controllers:
  dorflade-mhd:
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/tuxpeople/dorflade-mhd
          tag: 0.6.3
        env:
          TZ: ${TIMEZONE}
          DB_PATH: /app/data/products.db
          FLASK_DEBUG: "false"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
        resources:
          requests:
            cpu: 10m
            memory: 100Mi
          limits:
            memory: 256Mi
      litestream:
        image:
          repository: docker.io/litestream/litestream
          tag: 0.5.9
        args: ["replicate"]
        env:
          LITESTREAM_ACCESS_KEY_ID:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-id
          LITESTREAM_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-key
          MINIO_ENDPOINT:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-endpoint
          MINIO_BUCKET:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-bucket
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
          limits:
            cpu: 500m
            memory: 128Mi
    initContainers:
      01-litestream-restore:
        image:
          repository: docker.io/litestream/litestream
          tag: 0.5.9
        args:
          - restore
          - -if-db-not-exists
          - -if-replica-exists
          - /app/data/products.db
        env:
          LITESTREAM_ACCESS_KEY_ID:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-id
          LITESTREAM_SECRET_ACCESS_KEY:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-key
          MINIO_ENDPOINT:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-endpoint
          MINIO_BUCKET:
            valueFrom:
              secretKeyRef:
                name: dorflade-mhd-secrets
                key: litestream-minio-bucket

defaultPodOptions:
  imagePullSecrets:
    - name: ghcr-pullsecret
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: { type: RuntimeDefault }

service:
  app:
    controller: dorflade-mhd
    ports:
      http:
        port: &port 5005

ingress:
  app:
    enabled: true
    className: external
    annotations:
      nginx.ingress.kubernetes.io/auth-method: GET
      nginx.ingress.kubernetes.io/auth-url: https://auth.${SECRET_DOMAIN}/api/verify
      nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}?rm=$request_method
      nginx.ingress.kubernetes.io/auth-response-headers: Remote-User,Remote-Name,Remote-Groups,Remote-Email
      nginx.ingress.kubernetes.io/auth-snippet: |
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Scheme $scheme;
      hajimari.io/icon: mdi:barcode-scan
    hosts:
      - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: *port
    tls:
      - hosts:
          - *host
        secretName: ${SECRET_DOMAIN/./-}-production-tls

persistence:
  tmp:
    enabled: true
    type: emptyDir
  litestream-config:
    type: configMap
    name: dorflade-mhd-litestream-config
    advancedMounts:
      dorflade-mhd:
        litestream:
          - subPath: litestream-replicate.yml
            path: /etc/litestream.yml
            readOnly: true
        01-litestream-restore:
          - subPath: litestream-restore.yml
            path: /etc/litestream.yml
            readOnly: true
  database:
    enabled: true
    type: emptyDir
    advancedMounts:
      dorflade-mhd:
        app:
          - path: /app/data
        litestream:
          - path: /app/data
        01-litestream-restore:
          - path: /app/data
