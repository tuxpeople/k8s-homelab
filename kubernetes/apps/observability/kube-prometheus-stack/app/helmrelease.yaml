---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kube-prometheus-stack
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.17.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    cleanPrometheusOperatorObjectNames: true

    defaultRules:
      create: false

    grafana:
      enabled: false

    alertmanager:
      enabled: false

    prometheus:
      enabled: true
      agentMode: true
      service:
        enabled: false
      ingress:
        enabled: false
      serviceMonitor:
        selfMonitor: false
      prometheusSpec:
        scrapeInterval: 60s
        scrapeTimeout: 10s
        replicas: 1
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        remoteWrite:
          - url: http://monitoring-mqtt.lab.tdeutsch.ch:9090/api/v1/write
